services:
  mcp-server:
    container_name: rtm-class-mcp-server
    profiles: ['prod']
    build:
      context: .
      dockerfile: Dockerfile
      target: runner
    restart: unless-stopped
    env_file:
      - path: .env
        required: true
      - path: .env.local
        required: false
    environment:
      NODE_ENV: production
      NODE_OPTIONS: ${NODE_OPTIONS:---no-network-family-autoselection --dns-result-order=ipv4first}
      HTTP_PROXY: ${APP_HTTP_PROXY:-}
      HTTPS_PROXY: ${APP_HTTPS_PROXY:-}
      NO_PROXY: ${APP_NO_PROXY:-localhost,127.0.0.1,redis}
      http_proxy: ${APP_HTTP_PROXY:-}
      https_proxy: ${APP_HTTPS_PROXY:-}
      no_proxy: ${APP_NO_PROXY:-localhost,127.0.0.1,redis}
    ports:
      - '${PORT:-5002}:${PORT:-5002}'
    depends_on:
      redis:
        condition: service_healthy

  mcp-server-migrate:
    container_name: rtm-class-mcp-server-migrate
    profiles: ['prod']
    build:
      context: .
      dockerfile: Dockerfile
      target: builder
    command: ['npx', 'prisma', 'migrate', 'deploy']
    env_file:
      - path: .env
        required: true
      - path: .env.local
        required: false
    environment:
      NODE_ENV: production
      NODE_OPTIONS: ${NODE_OPTIONS:---no-network-family-autoselection --dns-result-order=ipv4first}
      HTTP_PROXY: ${APP_HTTP_PROXY:-}
      HTTPS_PROXY: ${APP_HTTPS_PROXY:-}
      NO_PROXY: ${APP_NO_PROXY:-localhost,127.0.0.1,redis}
      http_proxy: ${APP_HTTP_PROXY:-}
      https_proxy: ${APP_HTTPS_PROXY:-}
      no_proxy: ${APP_NO_PROXY:-localhost,127.0.0.1,redis}
    depends_on:
      redis:
        condition: service_healthy

  mcp-server-dev:
    container_name: rtm-class-mcp-server-dev
    profiles: ['dev']
    build:
      context: .
      dockerfile: Dockerfile
      target: deps
    working_dir: /app
    command: ['sh', '-c', 'npx prisma generate && npm run start:dev']
    restart: unless-stopped
    env_file:
      - path: .env
        required: true
      - path: .env.local
        required: false
    environment:
      NODE_ENV: development
      NODE_OPTIONS: ${NODE_OPTIONS:---no-network-family-autoselection --dns-result-order=ipv4first}
      CHOKIDAR_USEPOLLING: 'true'
      WATCHPACK_POLLING: 'true'
      TSC_WATCHFILE: 'FixedPollingInterval'
      TSC_WATCHDIRECTORY: 'DynamicPriorityPolling'
      HTTP_PROXY: ${APP_HTTP_PROXY:-}
      HTTPS_PROXY: ${APP_HTTPS_PROXY:-}
      NO_PROXY: ${APP_NO_PROXY:-localhost,127.0.0.1,redis}
      http_proxy: ${APP_HTTP_PROXY:-}
      https_proxy: ${APP_HTTPS_PROXY:-}
      no_proxy: ${APP_NO_PROXY:-localhost,127.0.0.1,redis}
    ports:
      - '${PORT:-5002}:${PORT:-5002}'
    volumes:
      - .:/app
      - /app/node_modules
    depends_on:
      redis:
        condition: service_healthy

  redis:
    container_name: rtm-class-mcp-server-redis
    image: redis:7-alpine
    restart: unless-stopped
    command: ['redis-server', '--appendonly', 'yes']
    ports:
      - '${REDIS_HOST_PORT:-6380}:6379'
    volumes:
      - rtm_class_mcp_server_redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  rtm_class_mcp_server_redis_data:
    name: rtm_class_mcp_server_redis_data
