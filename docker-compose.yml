services:
  mcp-server:
    container_name: rtm-class-mcp-server
    profiles: ['prod']
    build:
      context: .
      dockerfile: Dockerfile
      target: runner
    restart: unless-stopped
    env_file:
      - path: .env
        required: true
      - path: .env.local
        required: false
    environment:
      NODE_ENV: production
      NODE_OPTIONS: ${NODE_OPTIONS:---no-network-family-autoselection --dns-result-order=ipv4first}
      HTTP_PROXY: ${APP_HTTP_PROXY:-}
      HTTPS_PROXY: ${APP_HTTPS_PROXY:-} 
      http_proxy: ${APP_HTTP_PROXY:-}
      https_proxy: ${APP_HTTPS_PROXY:-} 
    ports:
      - '${HOST_PORT:-5003}:${PORT:-5002}'

  mcp-server-migrate:
    container_name: rtm-class-mcp-server-migrate
    profiles: ['prod']
    build:
      context: .
      dockerfile: Dockerfile
      target: builder
    command: ['npx', 'prisma', 'migrate', 'deploy']
    env_file:
      - path: .env
        required: true
      - path: .env.local
        required: false
    environment:
      NODE_ENV: production
      NODE_OPTIONS: ${NODE_OPTIONS:---no-network-family-autoselection --dns-result-order=ipv4first}
      HTTP_PROXY: ${APP_HTTP_PROXY:-}
      HTTPS_PROXY: ${APP_HTTPS_PROXY:-} 
      http_proxy: ${APP_HTTP_PROXY:-}
      https_proxy: ${APP_HTTPS_PROXY:-} 

  mcp-server-dev:
    container_name: rtm-class-mcp-server-dev
    profiles: ['dev']
    build:
      context: .
      dockerfile: Dockerfile
      target: deps
    working_dir: /app
    command: ['sh', '-c', 'npx prisma generate && npm run start:dev']
    restart: unless-stopped
    env_file:
      - path: .env
        required: true
      - path: .env.local
        required: false
    environment:
      NODE_ENV: development
      NODE_OPTIONS: ${NODE_OPTIONS:---no-network-family-autoselection --dns-result-order=ipv4first}
      CHOKIDAR_USEPOLLING: 'true'
      WATCHPACK_POLLING: 'true'
      TSC_WATCHFILE: 'FixedPollingInterval'
      TSC_WATCHDIRECTORY: 'DynamicPriorityPolling'
      HTTP_PROXY: ${APP_HTTP_PROXY:-}
      HTTPS_PROXY: ${APP_HTTPS_PROXY:-} 
      http_proxy: ${APP_HTTP_PROXY:-}
      https_proxy: ${APP_HTTPS_PROXY:-}  
    ports:
      - '${HOST_PORT:-5003}:${PORT:-5002}'
    volumes:
      - .:/app
      - /app/node_modules